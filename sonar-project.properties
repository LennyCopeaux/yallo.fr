# Configuration SonarCloud pour Yallo
# Documentation: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

# Identifiants du projet
sonar.projectKey=LennyCopeaux_yallo.fr
sonar.organization=lennycopeaux

# Métadonnées du projet
sonar.projectName=Yallo
sonar.projectVersion=0.1.0

# Chemin des sources
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.test.ts,src/__tests__/**/*.test.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/drizzle/**,**/coverage/**,**/*.config.*

# Couverture de code
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/__tests__/**/*,**/*.config.*,**/types.ts

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encodage
sonar.sourceEncoding=UTF-8
