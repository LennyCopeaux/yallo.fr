name: Deploy to Staging

on:
  push:
    branches: [develop]

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint
        continue-on-error: true

      - name: Run tests
        run: pnpm run test:run

      - name: Build application
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          AUTH_SECRET: "fake-secret-for-build-only"
          NEXT_PUBLIC_APP_URL: "https://staging.yallo.fr"
        run: pnpm run build

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate coverage
        run: pnpm run test:coverage
        continue-on-error: true

      - name: Verify coverage file exists
        run: |
          if [ ! -f "coverage/lcov.info" ]; then
            echo "Warning: coverage/lcov.info not found. Coverage may be incomplete."
            ls -la coverage/ || echo "Coverage directory does not exist"
          else
            echo "Coverage file found:"
            ls -lh coverage/lcov.info
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=LennyCopeaux_yallo.fr
            -Dsonar.organization=lennycopeaux
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src
            -Dsonar.tests=src/__tests__
            -Dsonar.test.inclusions=src/__tests__/**/*.test.ts
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/drizzle/**
            -Dsonar.ci.skip=false

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: staging
      url: https://staging.yallo.fr
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Staging
        id: deploy
        uses: amondnet/vercel-action@v25
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-deployment: false
        continue-on-error: false

      - name: Deployment Summary
        if: success()
        run: |
          echo "## Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs Staging" >> $GITHUB_STEP_SUMMARY
          echo "- Marketing: https://staging.yallo.fr" >> $GITHUB_STEP_SUMMARY
          echo "- Dashboard: https://app.staging.yallo.fr" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Preview URL: ${{ steps.deploy.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
      
      - name: Deployment Failed
        if: failure()
        run: |
          echo "## Staging Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Troubleshooting" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify domains staging.yallo.fr and app.staging.yallo.fr are configured in Vercel Settings" >> $GITHUB_STEP_SUMMARY
          echo "2. Check GitHub secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID)" >> $GITHUB_STEP_SUMMARY
          echo "3. Check Vercel logs: https://vercel.com/lenny-copeauxs-projects/yallo-fr" >> $GITHUB_STEP_SUMMARY
