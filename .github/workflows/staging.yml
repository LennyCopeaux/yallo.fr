# Staging Environment Workflow
# Déploiement automatique sur l'environnement de staging/test

name: Deploy to Staging

on:
  push:
    branches: [develop]

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # JOB 1: Tests et validation
  # ==========================================
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Run tests
        run: npm run test:run

      - name: 🏗️ Build application
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          AUTH_SECRET: "fake-secret-for-build-only"
          NEXT_PUBLIC_APP_URL: "https://staging.yallo.fr"
        run: npm run build

  # ==========================================
  # JOB 2: Analyse SonarCloud
  # ==========================================
  sonarcloud:
    name: 📊 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 📊 Generate coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: 🔍 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # JOB 3: Déploiement Staging
  # ==========================================
  deploy-staging:
    name: 🎭 Deploy to Staging
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: staging
      url: https://staging.yallo.fr
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Vercel Staging (Preview)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          alias-domains: |
            staging.yallo.fr
            app.staging.yallo.fr
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: '--yes'
        continue-on-error: false

      - name: 📝 Deployment Summary
        if: success()
        run: |
          echo "## 🎭 Staging Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Marketing:** https://staging.yallo.fr" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard:** https://app.staging.yallo.fr" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** ${{ steps.deploy.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Note" >> $GITHUB_STEP_SUMMARY
          echo "Si les domaines ne fonctionnent pas, vérifie qu'ils sont bien configurés dans Vercel → Settings → Domains" >> $GITHUB_STEP_SUMMARY
      
      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "## ❌ Staging Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Vérifications à faire :" >> $GITHUB_STEP_SUMMARY
          echo "1. Les domaines `staging.yallo.fr` et `app.staging.yallo.fr` sont-ils ajoutés dans Vercel → Settings → Domains ?" >> $GITHUB_STEP_SUMMARY
          echo "2. Les secrets GitHub (`VERCEL_TOKEN`, `VERCEL_ORG_ID`, `VERCEL_PROJECT_ID`) sont-ils corrects ?" >> $GITHUB_STEP_SUMMARY
          echo "3. Consulte les logs Vercel pour plus de détails : https://vercel.com/lenny-copeauxs-projects/yallo-fr" >> $GITHUB_STEP_SUMMARY
          exit 1
